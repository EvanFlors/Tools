services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: herramientas-server
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-4000}:4000"
    env_file:
      - ./server/.env
    environment:
      - PORT=4000
    networks:
      - herramientas-net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    container_name: herramientas-client
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:80"
    depends_on:
      - server
    networks:
      - herramientas-net

networks:
  herramientas-net:
    driver: bridge
